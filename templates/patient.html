<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=final">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Aura | My Board</title>
</head>
<body class="p-4 lg:p-10">
    <!-- SAFE DATA VAULT -->
    <script id="memory-vault" type="application/json">{{ memories|tojson|safe }}</script>
    
    <div class="wave-container"><div class="wave"></div></div>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10">
        <section class="card p-10 flex flex-col min-h-[600px]">
            <h1 class="text-6xl font-bold text-sky-900 mb-2">Hello, {{ profile.patient_name }}</h1>
            <p class="text-2xl text-sky-600 mb-8 italic">You are {{ profile.location_status }}.</p>
            <div class="bg-white/40 rounded-3xl p-6 border-2 border-white flex-grow flex flex-col">
                <div id="chat-messages" class="flex-grow overflow-y-auto mb-4 h-[350px]"></div>
                <div class="flex gap-3">
                    <input id="chat-input" type="text" class="flex-grow p-4 rounded-full shadow-md outline-none" placeholder="Talk to Aura...">
                    <button onclick="startVoice()" class="btn-main !p-4 bg-sky-400 shadow-lg">🎤</button>
                    <button onclick="sendChat()" class="btn-main !p-4 shadow-lg">➜</button>
                </div>
            </div>
        </section>

        <section class="flex flex-col gap-6">
            <button onclick="startCrossword()" class="btn-main py-10 text-4xl bg-sky-800">✍️ Daily Puzzle</button>
            <button onclick="startWordSearch()" class="btn-main py-10 text-4xl bg-sky-600">🔍 Nature Search</button>
            <button onclick="startFaceMatch()" class="btn-main py-10 text-4xl bg-sky-500">🧩 Memory Game</button>
            
            <div class="card p-6 mt-auto">
                <h2 class="text-xl font-bold mb-4 text-sky-800">Your Loved Ones</h2>
                <div class="flex gap-4 overflow-x-auto pb-2">
                    {% for m in memories %}
                    <img src="{{ m.image_url }}" class="w-24 h-24 rounded-full border-4 border-white object-cover shadow-md flex-shrink-0" title="{{ m.name }}">
                    {% endfor %}
                </div>
                <div class="text-center mt-4"><a href="/caregiver" class="text-sky-400 underline">Caregiver Settings</a></div>
            </div>
        </section>
    </div>
    <script src="{{ url_for('static', filename='js/games.js') }}"></script>
</body>
</html>
