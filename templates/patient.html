<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Tailwind for layout and fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Aura | My Daily Board</title>
</head>
<body class="p-4 md:p-8">
    <!-- Calming Water Wave Background -->
    <div class="wave-container">
        <div class="wave"></div>
    </div>

    <div class="container mx-auto max-w-5xl">
        <!-- 1. Daily Orientation (ROT Therapy) -->
        <header class="card p-8 md:p-12 mb-10 text-center">
            <div id="orientation-content">
                <h1 class="text-5xl md:text-6xl font-bold text-sky-900 mb-4">Hello, {{ profile.name }}!</h1>
                <p class="text-3xl md:text-4xl text-sky-700 leading-relaxed">
                    Today is <span id="date-string" class="font-semibold text-sky-900"></span>. <br>
                    You are {{ profile.location_status }}.
                </p>
            </div>
            <!-- Listen Button for Accessibility -->
            <button onclick="speakOrientation()" class="mt-8 text-sky-500 text-2xl font-bold hover:text-sky-700 flex items-center justify-center mx-auto gap-2">
                🔊 <span class="underline">Listen to this</span>
            </button>
        </header>

        <div class="grid md:grid-cols-2 gap-10">
            
            <!-- 2. Memory Vault (Photos and Messages) -->
            <section class="card p-8 overflow-y-auto max-h-[600px]">
                <h2 class="text-3xl font-bold mb-8 text-center text-sky-800 border-b-2 border-sky-100 pb-4">Your Loved Ones</h2>
                
                <div class="space-y-12">
                    {% for m in memories %}
                    <div class="text-center pb-6 border-b border-sky-50 last:border-0">
                        <!-- High contrast photo -->
                        <img src="{{ m.image_url }}" 
                             class="w-56 h-56 rounded-full mx-auto mb-4 border-8 border-white object-cover shadow-lg"
                             alt="Photo of {{ m.name }}">
                        
                        <h3 class="text-4xl font-bold text-sky-900">{{ m.name }}</h3>
                        <p class="text-2xl text-sky-600 font-medium">{{ m.relationship }}</p>
                        
                        {% if m.message %}
                        <p class="text-xl italic mt-4 text-sky-800 bg-sky-50 p-4 rounded-2xl">"{{ m.message }}"</p>
                        {% endif %}
                    </div>
                    {% else %}
                    <p class="text-center text-xl text-sky-500 italic">No memories added yet. Visit the Caregiver Portal.</p>
                    {% endfor %}
                </div>
            </section>

<!-- Games Menu -->
<section class="flex flex-col gap-6">
    <button onclick='startFaceMatch({{ memories|tojson|safe }})' class="btn-main py-10">🧩 Remember Faces</button>
    
    <!-- New Word Search Button -->
    <button onclick="startWordSearch()" class="btn-main py-10 bg-sky-600">🔍 Word Search</button>
    
    <!-- New Crossword Button -->
    <button onclick="startCrossword()" class="btn-main py-10 bg-sky-700">✍️ Daily Crossword</button>

    <a href="/" class="text-center text-sky-600 font-bold mt-10">← Go Back Home</a>
</section>

        </div>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/games.js') }}"></script>
    <script>
        // Set the live date for orientation
        function updateDate() {
            const now = new Date();
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            const dateEl = document.getElementById('date-string');
            if (dateEl) {
                dateEl.innerText = now.toLocaleDateString(undefined, options);
            }
        }
        updateDate();
    </script>
</body>
</html>
