<body class="p-10 bg-sky-100 flex items-center justify-center min-h-screen">
    <form action="/login" method="POST" class="bg-white p-10 rounded-3xl shadow-xl w-full max-w-md">
        <h2 class="text-3xl font-bold mb-6">Caregiver Login</h2>
        <input type="email" name="email" placeholder="Email" class="w-full p-4 border rounded-xl mb-4" required>
        <input type="password" name="password" placeholder="Password" class="w-full p-4 border rounded-xl mb-4" required>
        <button type="submit" class="bg-sky-600 text-white w-full py-4 rounded-xl font-bold">Login</button>
    </form>
</body>
